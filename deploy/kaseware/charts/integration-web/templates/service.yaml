apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.service.type }}
{{- if hasKey .Values.service "loadBalancerIP" }}
  loadBalancerIP: {{ .Values.service.loadBalancerIP }}
{{- end }}
  selector:
    app: {{ .Release.Name }}
  ports:
    - protocol: TCP
      name: main
      port: {{ .Values.service.port }}
{{- if .Values.core.metricsEnabled }}
    - protocol: TCP
      name: metrics
      port: {{ .Values.service.metricsPort }}
{{- end }}
{{- if .Values.exporter.jmxEnabled }}
    - protocol: TCP
      name: jmx
      port: {{ .Values.jmxprometheus.port }}
{{- end }}
