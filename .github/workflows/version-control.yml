name: Automated Version Control

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - release/**

jobs:
  version-control:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Determine Version Update Type
        id: update-type
        run: |
          SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"
          if [[ "$SOURCE_BRANCH" =~ ^(feature|feat)/.+ ]]; then
            UPDATE_TYPE="minor"
          elif [[ "$SOURCE_BRANCH" =~ ^(hotfix|patch|bug|fix)/.+ ]]; then
            UPDATE_TYPE="patch"
          elif [[ "$SOURCE_BRANCH" =~ ^(major|breaking)/.+ ]]; then
            UPDATE_TYPE="major"
          else
            UPDATE_TYPE="patch"
          fi
          echo "update_type=$UPDATE_TYPE" >> $GITHUB_OUTPUT

      - name: Read Current Version
        id: current-version
        run: |
          CURRENT_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('./version.json')).version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Fetch Latest Release Tag
        id: latest-tag
        run: |
          git fetch --tags --force
          LATEST_TAG=$(git tag -l "kaseware-integration-platform.v*" --sort=-version:refname | head -n1 || true)
          if [ -n "$LATEST_TAG" ]; then
            LATEST_TAG_VERSION=${LATEST_TAG#kaseware-integration-platform.v}
            echo "latest_tag_version=$LATEST_TAG_VERSION" >> $GITHUB_OUTPUT
          else
            echo "latest_tag_version=" >> $GITHUB_OUTPUT
          fi

      - name: Align Version With Latest Tag (if mismatch)
        id: align-version
        run: |
          CUR="${{ steps.current-version.outputs.current_version }}"
          TAG="${{ steps.latest-tag.outputs.latest_tag_version }}"
          if [ -n "$TAG" ] && [ "$CUR" != "$TAG" ]; then
            echo "Aligning version.json to latest tag $TAG"
            node -e "const fs=require('fs');const f='version.json';const d=JSON.parse(fs.readFileSync(f));d.version=process.env.TAG;d.lastUpdated=new Date().toISOString();fs.writeFileSync(f, JSON.stringify(d,null,2)+'\n')" TAG=$TAG
            node scripts/version-manager.js sync
          fi
          BASE_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('./version.json')).version")
          echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT

      - name: Bump Version
        id: update-version
        run: |
          UPDATE_TYPE="${{ steps.update-type.outputs.update_type }}"
          node scripts/version-manager.js bump $UPDATE_TYPE
          NEW_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('./version.json')).version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit Version Changes
        id: commit-changes
        run: |
          NEW_VERSION="${{ steps.update-version.outputs.new_version }}"
          git add version.json
          git add web/package.json || true
          git add api/gradle.properties

          if git diff --staged --quiet; then
            echo "changes_committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: update version to $NEW_VERSION

            - Updated version.json
            - Synced frontend package.json
            - Synced api/gradle.properties (projectVersion + contractVersion)

            Source: PR #${{ github.event.pull_request.number }} (${{ github.event.pull_request.head.ref }} -> ${{ github.event.pull_request.base.ref }})
            Update type: ${{ steps.update-type.outputs.update_type }}"
            echo "changes_committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Push Changes
        if: steps.commit-changes.outputs.changes_committed == 'true'
        run: |
          TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"
          git push origin HEAD:$TARGET_BRANCH
          echo "Pushed version commit to $TARGET_BRANCH"

      - name: Create and Push Release Tag
        run: |
          NEW_VERSION="${{ steps.update-version.outputs.new_version }}"
          APP_PREFIX="kaseware-integration-platform"
          TAG_NAME="$APP_PREFIX.v$NEW_VERSION"

          git fetch --tags --force
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists, skipping."
          else
            git tag -a "$TAG_NAME" -m "Release $NEW_VERSION

            Auto-generated from PR #${{ github.event.pull_request.number }}
            Source: ${{ github.event.pull_request.head.ref }} -> ${{ github.event.pull_request.base.ref }}"
            git push origin "$TAG_NAME"
            echo "Pushed release tag: $TAG_NAME"
          fi

      - name: Summary
        run: |
          echo "=== Version Control Summary ==="
          echo "Previous version: ${{ steps.current-version.outputs.current_version }}"
          echo "New version: ${{ steps.update-version.outputs.new_version }}"
          echo "Update type: ${{ steps.update-type.outputs.update_type }}"
          echo "Source branch: ${{ github.event.pull_request.head.ref }}"
          echo "Target branch: ${{ github.event.pull_request.base.ref }}"
          echo "Release tag: kaseware-integration-platform.v${{ steps.update-version.outputs.new_version }}"
          echo ""
          echo "All version files updated and tag pushed successfully."
