name: Backend / Deploy

on:
  push:
    branches:
      - main
      - 'release/**'
    paths:
      - 'api/**'
      - 'version.json'
      - '.github/workflows/api-deploy.yml'

concurrency:
  group: api-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build and test Management Service (contract built inline as dependency)
  build-management-service:
    name: Management • Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & Test Management Service
        working-directory: api
        run: ./gradlew :integration-management-service:check :integration-management-service:bootJar --no-daemon

      - name: Upload verified IMS JAR
        uses: actions/upload-artifact@v4
        with:
          name: ims-jar
          path: api/integration-management-service/build/libs/integration-management-service-*.jar
          retention-days: 1

  # Build and test Execution Service (contract built inline as dependency)
  build-execution-service:
    name: Execution • Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & Test Execution Service
        working-directory: api
        run: ./gradlew :integration-execution-service:check :integration-execution-service:bootJar --no-daemon

      - name: Upload verified IES JAR
        uses: actions/upload-artifact@v4
        with:
          name: ies-jar
          path: api/integration-execution-service/build/libs/integration-execution-service-*.jar
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Push IMS image to Docker Hub (after tests pass)
  # ---------------------------------------------------------------------------
  publish-ims:
    name: IMS • Docker Push
    needs: build-management-service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download verified IMS JAR
        uses: actions/download-artifact@v4
        with:
          name: ims-jar
          path: api/integration-management-service/build/libs

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r '.version' version.json)
          echo "Resolved version: $VERSION"
          [ -z "$VERSION" ] && echo "ERROR: version is empty!" && exit 1
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push kip-integration:ims
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./api/integration-management-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kip-integration:ims-${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/kip-integration:ims-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Push IES image to Docker Hub (after tests pass)
  # ---------------------------------------------------------------------------
  publish-ies:
    name: IES • Docker Push
    needs: build-execution-service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download verified IES JAR
        uses: actions/download-artifact@v4
        with:
          name: ies-jar
          path: api/integration-execution-service/build/libs

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r '.version' version.json)
          echo "Resolved version: $VERSION"
          [ -z "$VERSION" ] && echo "ERROR: version is empty!" && exit 1
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push kip-integration:ies
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./api/integration-execution-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kip-integration:ies-${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/kip-integration:ies-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
