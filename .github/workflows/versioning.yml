name: Auto Version Bump

# main      -> label-driven semantic bump (bump:patch / bump:minor / bump:major)
# release/* -> per-module RC versioning (x.y.z-rc.N)
#              - branch name strictly validated (release/x.y.z only)
#              - each module has its own independent RC counter via git tags
#              - annotated git tags created per changed module on every merge
#
# Versions are stored in api/gradle.properties (projectVersion / contractVersion).
# No Maven or JDK required — all version reads/writes use pure shell.

on:
  pull_request:
    branches:
      - main
      - 'release/**'
    types: [closed]

# Prevent parallel version bumps on the same branch.
# Never cancel in-progress to avoid half-written gradle.properties commits.
concurrency:
  group: versioning-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:

  # ===========================================================================
  # JOB 1: Semantic version bump — PRs merging into main
  # ===========================================================================
  version-bump-main:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_VERSION_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Detect changed modules
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            contract:
              - 'api/integration-execution-contract/**'
            management:
              - 'api/integration-management-service/**'
            execution:
              - 'api/integration-execution-service/**'

      - name: Resolve bump type from PR labels
        id: bump-type
        env:
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          BUMP="patch"
          if echo "$PR_LABELS" | grep -q '"bump:major"'; then
            BUMP="major"
          elif echo "$PR_LABELS" | grep -q '"bump:minor"'; then
            BUMP="minor"
          fi
          echo "type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Resolved bump type: $BUMP"

      - name: Write semver increment script
        run: |
          cat > /tmp/semver_bump.sh << 'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          VERSION="$1"
          BUMP="$2"
          # Strip any pre-release suffix (e.g. -rc.1) before incrementing
          VERSION=$(echo "$VERSION" | cut -d- -f1)
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          case "$BUMP" in
            major) echo "$((MAJOR + 1)).0.0" ;;
            minor) echo "${MAJOR}.$((MINOR + 1)).0" ;;
            patch) echo "${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            *)     echo "Unknown bump type: $BUMP" >&2; exit 1 ;;
          esac
          EOF
          chmod +x /tmp/semver_bump.sh

      # All versions live in api/gradle.properties.
      # contractVersion is bumped when the contract module changes.
      # projectVersion is bumped when IMS or IES changes.
      # Both keys are updated together when contract changes (contract version
      # is shared across all modules via gradle.properties).

      - name: Bump contract version in gradle.properties
        if: steps.filter.outputs.contract == 'true'
        id: contract-bump
        run: |
          PROPS="api/gradle.properties"
          CURRENT=$(grep '^contractVersion=' "$PROPS" | cut -d= -f2)
          NEW=$(/tmp/semver_bump.sh "$CURRENT" "${{ steps.bump-type.outputs.type }}")
          echo "Contract: $CURRENT -> $NEW"
          sed -i "s/^contractVersion=.*/contractVersion=${NEW}/" "$PROPS"
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Bump project version in gradle.properties (IMS)
        if: steps.filter.outputs.management == 'true'
        id: ims-bump
        run: |
          PROPS="api/gradle.properties"
          CURRENT=$(grep '^projectVersion=' "$PROPS" | cut -d= -f2)
          NEW=$(/tmp/semver_bump.sh "$CURRENT" "${{ steps.bump-type.outputs.type }}")
          echo "IMS projectVersion: $CURRENT -> $NEW"
          sed -i "s/^projectVersion=.*/projectVersion=${NEW}/" "$PROPS"
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Bump project version in gradle.properties (IES)
        if: >-
          steps.filter.outputs.execution == 'true' &&
          steps.filter.outputs.management != 'true'
        id: ies-bump
        run: |
          PROPS="api/gradle.properties"
          CURRENT=$(grep '^projectVersion=' "$PROPS" | cut -d= -f2)
          NEW=$(/tmp/semver_bump.sh "$CURRENT" "${{ steps.bump-type.outputs.type }}")
          echo "IES projectVersion: $CURRENT -> $NEW"
          sed -i "s/^projectVersion=.*/projectVersion=${NEW}/" "$PROPS"
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bumps
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet api/gradle.properties; then
            echo "No gradle.properties changes — nothing to commit."
            exit 0
          fi

          MSG_PARTS=()
          [ "${{ steps.filter.outputs.contract }}"  == "true" ] && MSG_PARTS+=("integration-execution-contract@${{ steps.contract-bump.outputs.new_version }}")
          [ "${{ steps.filter.outputs.management }}" == "true" ] && MSG_PARTS+=("integration-management-service@${{ steps.ims-bump.outputs.new_version }}")
          [ "${{ steps.filter.outputs.execution }}"  == "true" ] && MSG_PARTS+=("integration-execution-service@${{ steps.ies-bump.outputs.new_version }}")

          COMMIT_MSG="chore(version): bump $(IFS=', '; echo "${MSG_PARTS[*]}") [skip ci]"
          git add api/gradle.properties
          git commit -m "$COMMIT_MSG"
          git push origin "HEAD:main"
          echo "Pushed: $COMMIT_MSG"

  # ===========================================================================
  # JOB 2: Per-module RC bump — PRs merging into release/**
  #
  # Each module has its own independent RC counter tracked via git tags.
  # Tag format:  <module-name>-<base-version>-rc.<N>
  # Example:     integration-management-service-1.3.0-rc.2
  #              integration-execution-service-1.3.0-rc.1
  #              integration-execution-contract-1.3.0-rc.3
  # ===========================================================================
  version-bump-rc:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.base.ref, 'release/')
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Validate branch name strictly.
      #   Allowed:  release/x.y.z  (e.g. release/1.3.0)
      #   Rejected: release/1.3.0-feature  release/2026-03-foo  release/1.3
      # -----------------------------------------------------------------------
      - name: Validate release branch name
        id: validate
        run: |
          BRANCH="${{ github.event.pull_request.base.ref }}"
          echo "Target branch: $BRANCH"

          if [[ ! "$BRANCH" =~ ^release/[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid release branch name: '$BRANCH'"
            echo "::error::Required format: release/x.y.z  (e.g. release/1.3.0)"
            echo "::error::Rejected examples: release/1.3.0-feature  release/2026-03-foo  release/1.3"
            exit 1
          fi

          BASE_VERSION="${BRANCH#release/}"
          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Branch '$BRANCH' is valid. Base version: $BASE_VERSION"

      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_VERSION_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Fetch all tags
        run: |
          git fetch --tags
          BASE_VERSION="${{ steps.validate.outputs.base_version }}"
          echo "Existing RC tags for base version ${BASE_VERSION}:"
          git tag -l "*-${BASE_VERSION}-rc.*" | sort || echo "  (none)"

      - name: Detect changed modules
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            contract:
              - 'api/integration-execution-contract/**'
            management:
              - 'api/integration-management-service/**'
            execution:
              - 'api/integration-execution-service/**'

      # -----------------------------------------------------------------------
      # Step 2: Calculate the next RC for each module independently.
      #   Scans only that module's own tags to determine its RC counter.
      #   No-tags case defaults to rc.1.
      # -----------------------------------------------------------------------
      - name: Calculate per-module RC versions
        id: rc-calc
        run: |
          BASE_VERSION="${{ steps.validate.outputs.base_version }}"

          next_rc() {
            local MODULE="$1"
            local LAST
            LAST=$(git tag -l "${MODULE}-${BASE_VERSION}-rc.*" \
                   | sed -n 's/.*-rc\.\([0-9]*\)$/\1/p' \
                   | sort -n | tail -1)
            if [ -z "$LAST" ]; then
              echo 1
            else
              echo $((LAST + 1))
            fi
          }

          CONTRACT_RC=$(next_rc "integration-execution-contract")
          IMS_RC=$(next_rc "integration-management-service")
          IES_RC=$(next_rc "integration-execution-service")

          CONTRACT_VERSION="${BASE_VERSION}-rc.${CONTRACT_RC}"
          IMS_VERSION="${BASE_VERSION}-rc.${IMS_RC}"
          IES_VERSION="${BASE_VERSION}-rc.${IES_RC}"

          echo "contract_version=$CONTRACT_VERSION" >> "$GITHUB_OUTPUT"
          echo "ims_version=$IMS_VERSION"           >> "$GITHUB_OUTPUT"
          echo "ies_version=$IES_VERSION"           >> "$GITHUB_OUTPUT"

          echo ""
          echo "Per-module RC versions for this merge:"
          echo "  integration-execution-contract -> $CONTRACT_VERSION"
          echo "  integration-management-service -> $IMS_VERSION"
          echo "  integration-execution-service  -> $IES_VERSION"

      # -----------------------------------------------------------------------
      # Step 3: Apply the correct RC version to gradle.properties.
      #   contractVersion is updated when the contract module changes.
      #   projectVersion is updated when IMS or IES changes.
      # -----------------------------------------------------------------------
      - name: Bump contract RC version in gradle.properties
        if: steps.filter.outputs.contract == 'true'
        run: |
          RC_VERSION="${{ steps.rc-calc.outputs.contract_version }}"
          PROPS="api/gradle.properties"
          CURRENT=$(grep '^contractVersion=' "$PROPS" | cut -d= -f2)
          echo "Contract: $CURRENT -> $RC_VERSION"
          sed -i "s/^contractVersion=.*/contractVersion=${RC_VERSION}/" "$PROPS"

      - name: Bump management service RC version in gradle.properties
        if: steps.filter.outputs.management == 'true'
        run: |
          RC_VERSION="${{ steps.rc-calc.outputs.ims_version }}"
          PROPS="api/gradle.properties"
          CURRENT=$(grep '^projectVersion=' "$PROPS" | cut -d= -f2)
          echo "IMS projectVersion: $CURRENT -> $RC_VERSION"
          sed -i "s/^projectVersion=.*/projectVersion=${RC_VERSION}/" "$PROPS"

      - name: Bump execution service RC version in gradle.properties
        if: >-
          steps.filter.outputs.execution == 'true' &&
          steps.filter.outputs.management != 'true'
        run: |
          RC_VERSION="${{ steps.rc-calc.outputs.ies_version }}"
          PROPS="api/gradle.properties"
          CURRENT=$(grep '^projectVersion=' "$PROPS" | cut -d= -f2)
          echo "IES projectVersion: $CURRENT -> $RC_VERSION"
          sed -i "s/^projectVersion=.*/projectVersion=${RC_VERSION}/" "$PROPS"

      # -----------------------------------------------------------------------
      # Step 4: Commit gradle.properties, create per-module annotated tags, push.
      # -----------------------------------------------------------------------
      - name: Commit RC bumps and create per-module git tags
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet api/gradle.properties; then
            echo "No gradle.properties changes — nothing to commit."
            exit 0
          fi

          MSG_PARTS=()
          TAGS=()

          if [ "${{ steps.filter.outputs.contract }}" == "true" ]; then
            V="${{ steps.rc-calc.outputs.contract_version }}"
            MSG_PARTS+=("integration-execution-contract@${V}")
            TAGS+=("integration-execution-contract-${V}")
          fi
          if [ "${{ steps.filter.outputs.management }}" == "true" ]; then
            V="${{ steps.rc-calc.outputs.ims_version }}"
            MSG_PARTS+=("integration-management-service@${V}")
            TAGS+=("integration-management-service-${V}")
          fi
          if [ "${{ steps.filter.outputs.execution }}" == "true" ]; then
            V="${{ steps.rc-calc.outputs.ies_version }}"
            MSG_PARTS+=("integration-execution-service@${V}")
            TAGS+=("integration-execution-service-${V}")
          fi

          COMMIT_MSG="chore(version): bump $(IFS=', '; echo "${MSG_PARTS[*]}") [skip ci]"

          git add api/gradle.properties
          git commit -m "$COMMIT_MSG"

          # Create one annotated tag per changed module (independent RC per module)
          for TAG in "${TAGS[@]}"; do
            git tag -a "$TAG" -m "Release candidate: $TAG"
            echo "Created tag: $TAG"
          done

          TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"
          git push origin "HEAD:${TARGET_BRANCH}"
          git push origin --tags
          echo ""
          echo "Pushed commit + ${#TAGS[@]} tag(s) to ${TARGET_BRANCH}"
          for TAG in "${TAGS[@]}"; do echo "  -> $TAG"; done
