name: Backend

on:
  pull_request:
    branches:
      - main
      - release
      - 'release/**'
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  # Build and test Management Service
  # Gradle resolves :integration-execution-contract automatically via the multi-project build
  build-management-service:
    name: Management • Build
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./api/gradlew

      - name: Build & Test Management Service
        working-directory: api
        run: ./gradlew :integration-management-service:build --no-daemon

  # Build and test Execution Service
  # Gradle resolves :integration-execution-contract automatically via the multi-project build
  build-execution-service:
    name: Execution • Build
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./api/gradlew

      - name: Build & Test Execution Service
        working-directory: api
        run: ./gradlew :integration-execution-service:build --no-daemon
