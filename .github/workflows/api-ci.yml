name: Backend

on:
  pull_request:
    branches:
      - main
      - release
      - 'release/**'
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: api-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Build and test Management Service (contract built inline as dependency)
  build-management-service:
    name: Management • Build
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        working-directory: api
        run: chmod +x gradlew

      - name: Build & Test Management Service
        working-directory: api
        run: ./gradlew :integration-management-service:check --no-daemon

  # Build and test Execution Service (contract built inline as dependency)
  build-execution-service:
    name: Execution • Build
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        working-directory: api
        run: chmod +x gradlew

      - name: Build & Test Execution Service
        working-directory: api
        run: ./gradlew :integration-execution-service:check --no-daemon
