name: Backend

on:
  pull_request:
    branches:
      - main
      - release
      - 'release/**'
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  # Build and test Management Service (contract built inline as dependency)
  build-management-service:
    name: Management • Build
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build Contract Module (install to local repo)
        run: mvn -B clean install --no-transfer-progress --file api/integration-execution-contract/pom.xml

      - name: Build & Test Management Service
        working-directory: api/integration-management-service
        run: |
          chmod +x mvnw
          ./mvnw -B clean verify --no-transfer-progress

  # Build and test Execution Service (contract built inline as dependency)
  build-execution-service:
    name: Execution • Build
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build Contract Module (install to local repo)
        run: mvn -B clean install --no-transfer-progress --file api/integration-execution-contract/pom.xml

      - name: Build & Test Execution Service
        working-directory: api/integration-execution-service
        run: |
          chmod +x mvnw
          ./mvnw -B clean verify --no-transfer-progress
