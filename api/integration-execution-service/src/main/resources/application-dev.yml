# Development Environment Configuration
spring:
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VHOST:/}

integration:
  # KW API Configuration for Development
  kaseware:
    auth:
      username: ${KW_API_USERNAME}
      password: ${KW_API_PASSWORD}

  http-clients:
    proxy:
      enabled: ${HTTP_PROXY_ENABLED:false}
      host: ${HTTP_PROXY_HOST}
      port: ${HTTP_PROXY_PORT}

logging:
  level:
    com.integration.execution: INFO
    org.apache.camel: INFO
    org.springframework.amqp: INFO
    org.springframework.boot.autoconfigure: WARN
    org.springframework.boot.autoconfigure.condition: WARN
    org.springframework.context.annotation: WARN
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %-45.45logger{45}:%4line : %msg%n'

# ─── Translation API — Ollama dev overrides ──────────────────────────────────
# The translation-service (port 8083) uses Ollama internally with a 300 s
# inference timeout (ollama.timeout-seconds=300 in that service's config).
# IES must wait longer than that — set to 360 s to guarantee Ollama finishes
# before the IES-side HTTP socket times out.
#
# The default max-chars of 45 000 is too large for Ollama: a 45 K-char prompt
# with ~1 500 SEG separators overwhelms the model context window and always
# times out.  2 000 chars (~300 words) is a manageable batch for local
# inference; the model can generate ~500 output tokens well within 5 minutes.
translation:
  api:
    timeout-seconds: 360   # > ollama.timeout-seconds (300) — let Ollama finish first
    max-chars: 2000        # ~300 words per batch — LLM-manageable for local inference
