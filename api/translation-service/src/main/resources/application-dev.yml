# ─── Development / Docker Compose Profile ────────────────────────────────────
# Active when SPRING_PROFILES_ACTIVE=dev (set in docker-compose.dev.yml).
#
# base-url resolution priority:
#   1. OLLAMA_BASE_URL env var (set to http://ollama:11434 by docker-compose.dev.yml)
#   2. Default below: http://localhost:11434  (correct for bare-machine / Gradle runs)
#
# This means:
#   • docker compose up  → OLLAMA_BASE_URL resolves the Docker service name
#   • ./gradlew bootRun  → falls back to localhost, which is where `ollama serve` listens

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:mistral}
  timeout-seconds: ${OLLAMA_TIMEOUT_SECONDS:300}
  connect-timeout-seconds: ${OLLAMA_CONNECT_TIMEOUT_SECONDS:10}
  num-predict: ${OLLAMA_NUM_PREDICT:2048}

management:
  endpoint:
    health:
      # Expose full component details (Ollama status, disk space, etc.) in dev
      # to aid local debugging. Must not be set to 'always' in production profiles.
      show-details: always

logging:
  level:
    com.integration.translation: DEBUG
    org.springframework.web.client: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %-45.45logger{45}:%4line : %msg%n'

