# Development Environment Configuration
spring:
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VHOST:/}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  # JPA Configuration
  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false # Enable for debugging connection issues
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        default_schema: integration_platform
        jdbc:
          lob:
            non_contextual_creation: true

  # Flyway Configuration for Database Migrations
  flyway:
    enabled: true
    default-schema: integration_platform
    schemas:
      - integration_platform
      - notifications
    create-schemas: true
    validate-on-migrate: false
    clean-disabled: true
    locations:
      - classpath:db/migration
    table: flyway_schema_history
    sql-migration-prefix: V
    sql-migration-separator: __
    sql-migration-suffixes: .sql
    connect-retries: 3
    baseline-on-migrate: true
    baseline-version: 0

integration:
  execution:
    base-url: http://localhost:8081

  security:
    cors:
      allowed-origin-patterns:
        - '*' # Allow all origins in development
      allowed-methods:
        - 'GET'
        - 'POST'
        - 'PUT'
        - 'DELETE'
        - 'OPTIONS'
        - 'PATCH'
      allowed-headers:
        - '*' # Allow all headers in development
      exposed-headers:
        - '*'
      allow-credentials: true
      max-age: 86400 # 24 hours for development
      path-pattern: '/**'
    csp:
      enabled: false # Disable CSP in development for easier debugging
      default-src: "'self'"
      script-src: "'self'"
      style-src: "'self' 'unsafe-inline'"
      img-src: "'self' data: blob:"
      font-src: "'self' data:"
      connect-src: "'self'"
      frame-src: "'self'"
      object-src: "'none'"
      report-only: true # Use report-only mode in development

logging:
  level:
    com.integration: INFO
    org.apache.camel: INFO
    org.quartz: INFO
    org.flywaydb: INFO
    org.springframework.boot.autoconfigure: WARN
    org.springframework.boot.autoconfigure.flyway: INFO
    org.springframework.boot.autoconfigure.condition: WARN
    org.springframework.context.annotation: WARN
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %-45.45logger{45}:%4line : %msg%n'
